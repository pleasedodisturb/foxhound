<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Search HQ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwindcss.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: { 1: '#0f1117', 2: '#161822', 3: '#1e2130' },
            accent: { DEFAULT: '#10b981', dim: '#065f46' },
            urgent: '#ef4444',
            high: '#f59e0b',
            medium: '#3b82f6',
            low: '#6b7280',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
    .status-pill { @apply text-xs font-medium px-2.5 py-0.5 rounded-full; }
    .card { @apply bg-surface-2 border border-white/5 rounded-xl p-5; }
    .card-header { @apply text-sm font-semibold text-white/60 uppercase tracking-wider mb-3; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-surface-1 text-white/90 min-h-screen">
  <div class="max-w-6xl mx-auto px-4 py-8">

    <!-- Header -->
    <header class="mb-8 fade-in">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-3xl font-bold text-white">Job Search HQ</h1>
          <p class="text-white/50 mt-1" id="subtitle">Loading...</p>
        </div>
        <div class="flex items-center gap-3">
          <a id="linear-link" href="#" target="_blank"
             class="text-sm text-accent hover:text-accent/80 border border-accent/30 rounded-lg px-3 py-1.5 transition">
            Open in Linear
          </a>
          <span class="text-xs text-white/30" id="last-updated"></span>
        </div>
      </div>
    </header>

    <!-- Pipeline -->
    <section class="mb-8 fade-in" style="animation-delay: 0.05s">
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
        <div class="card text-center">
          <div class="text-3xl font-bold text-white/80" id="stat-researching">0</div>
          <div class="text-xs text-white/40 mt-1">Researching</div>
        </div>
        <div class="card text-center">
          <div class="text-3xl font-bold text-blue-400" id="stat-applied">0</div>
          <div class="text-xs text-white/40 mt-1">Applied</div>
        </div>
        <div class="card text-center">
          <div class="text-3xl font-bold text-amber-400" id="stat-interviewing">0</div>
          <div class="text-xs text-white/40 mt-1">Interviewing</div>
        </div>
        <div class="card text-center">
          <div class="text-3xl font-bold text-emerald-400" id="stat-offered">0</div>
          <div class="text-xs text-white/40 mt-1">Offers</div>
        </div>
      </div>
    </section>

    <!-- Milestones + Issues -->
    <section class="mb-8 fade-in" style="animation-delay: 0.1s">
      <div class="card">
        <div class="card-header">Milestones & Tasks</div>
        <div id="milestones-container">
          <p class="text-white/30 text-sm">Loading...</p>
        </div>
      </div>
    </section>

    <!-- Two-column: Activity + Companies -->
    <div class="grid md:grid-cols-2 gap-4 mb-8">

      <!-- Recent Activity -->
      <section class="fade-in" style="animation-delay: 0.15s">
        <div class="card h-full">
          <div class="card-header">Recent Activity</div>
          <div id="activity-container" class="space-y-3">
            <p class="text-white/30 text-sm">Loading...</p>
          </div>
        </div>
      </section>

      <!-- Target Companies -->
      <section class="fade-in" style="animation-delay: 0.2s">
        <div class="card h-full">
          <div class="card-header">Target Companies</div>
          <div id="companies-container" class="space-y-3">
            <p class="text-white/30 text-sm">Loading...</p>
          </div>
        </div>
      </section>
    </div>

    <!-- Quick Links -->
    <section class="fade-in" style="animation-delay: 0.25s">
      <div class="card">
        <div class="card-header">Quick Links</div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
          <a href="https://github.com/pleasedodisturb/job-search-hq" target="_blank"
             class="flex items-center gap-2 text-sm text-white/60 hover:text-accent p-2 rounded-lg hover:bg-white/5 transition">
            <span>GitHub Repo</span>
          </a>
          <a href="https://linear.app/abandoned-yachts/project/job-search-hq-9bcd78537fa9" target="_blank"
             class="flex items-center gap-2 text-sm text-white/60 hover:text-accent p-2 rounded-lg hover:bg-white/5 transition">
            <span>Linear Board</span>
          </a>
          <a href="https://www.linkedin.com/in/vitalikgaran/" target="_blank"
             class="flex items-center gap-2 text-sm text-white/60 hover:text-accent p-2 rounded-lg hover:bg-white/5 transition">
            <span>LinkedIn Profile</span>
          </a>
          <a href="https://docs.google.com/document/d/12sVN4KhonG2GvwQkeB65oUukUR27zDTyFLkT8Jp3gfg/edit" target="_blank"
             class="flex items-center gap-2 text-sm text-white/60 hover:text-accent p-2 rounded-lg hover:bg-white/5 transition">
            <span>CV (Google Docs)</span>
          </a>
        </div>
      </div>
    </section>

    <!-- Issue Stats Bar -->
    <footer class="mt-8 text-center text-xs text-white/20 fade-in" style="animation-delay: 0.3s">
      <span id="issue-stats"></span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
