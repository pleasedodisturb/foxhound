version: 1.0.0
title: "Job Intake"
description: "Parse a job posting, score against profile, log to CSV, create TickTick task"

instructions: |
  You are processing a job posting for Vitalik Garan. Read profile/target-roles.md for scoring
  rubric and profile/README.md for full identity context.

  ## Step 1 — Fetch & Extract
  If given a URL: fetch the job posting content (use Developer shell with curl, or computercontroller).
  If given a file path: read the file.
  If given pasted text: use directly.

  Extract:
  - company (name)
  - role (full title)
  - location (city/country + remote status)
  - url (original link)
  - source (linkedin / indeed / company site / etc.)
  - salary_range (if mentioned, else empty)
  - key_requirements (top 5 bullet points as a short string)
  - description_summary (2-3 sentences)

  ## Step 2 — Score 1-10
  Score against profile/target-roles.md. Apply ALL modifiers:
  - Base: does the role intent match (builder, AI, technical, product)? Start 5.
  - AI-native company or genuine AI product: +1
  - Remote-friendly or Frankfurt-based: +0 penalty (otherwise -1 to -3 based on distance)
  - Builder signals in JD (shipping, pipelines, building, tools): +1
  - Early-stage / founding team: +1
  - Dream company (Lovable, Mistral, Oxide, DeepL, Aleph Alpha, GitLab, Block): floor at 7
  - PMBOK/process-heavy, no AI: -2
  - Outside Germany, not remote: cap at 5
  - Below 100k EUR: -1
  - No title match but strong intent match: still score 7+ if everything else fits

  Write a 1-sentence rationale.

  ## Step 3 — Append to CSV
  Append ONE row to tracking/applications.csv. Format:
  date_applied,company,role,url,source,status,salary_range,contact,next_step,notes,fit_score
  
  Use today's date. Status = "interested". Notes = rationale. fit_score = X/10.
  NEVER overwrite existing rows. Only append.

  ## Step 4 — Create TickTick Task
  Use TickTick MCP if available. Create task:
  - Project ID: YOUR_TICKTICK_PROJECT_ID
  - Title: [X/10] Company — Role Title
  - Content: URL + score rationale
  - Priority: score 8-10 → High (5), 6-7 → Medium (3), 1-5 → Low (1)
  If TickTick MCP unavailable: note it in the summary.

  ## Step 5 — Create Linear Issue (if Linear MCP available)
  - Team ID: YOUR_LINEAR_TEAM_ID
  - Title: [Company] Role Title
  - Description: URL, score, key requirements, fit rationale
  - Priority: 8-10 → Urgent, 6-7 → High, 4-5 → Normal, 1-3 → Low
  - Status: Backlog
  If Linear MCP unavailable: skip silently.

  ## Step 6 — Present Summary
  ```
  📋 [Company] — Role Title
  📍 Location (remote status)
  🎯 Fit Score: X/10
  💡 Rationale: one-line reason
  🔗 URL
  ✅ Added to: CSV | TickTick | Linear (if available)
  ```

  ## Batch Mode
  If multiple URLs/files provided, process all and show a summary table at end.

activities:
  - "Fetch and parse job posting"
  - "Score against profile"
  - "Append to applications.csv"
  - "Create TickTick task"
  - "Create Linear issue"
  - "Present summary"

extensions:
  - type: builtin
    name: developer
  - type: builtin
    name: computercontroller

parameters:
  - key: job_input
    input_type: string
    requirement: required
    description: "Job posting URL, path to saved MD file, or pasted description"
    default: ""
  - key: tailor_resume
    input_type: boolean
    requirement: optional
    description: "Generate tailored CV and cover letter via CV Forge"
    default: false
```
